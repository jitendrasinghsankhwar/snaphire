services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snaphire
      POSTGRES_USER: snaphire
      POSTGRES_PASSWORD: snaphire
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snaphire"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/snaphire
      QUARKUS_DATASOURCE_USERNAME: snaphire
      QUARKUS_DATASOURCE_PASSWORD: snaphire
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  ai-service:
    build: ./ai-service
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-service
      - frontend

volumes:
  pgdata:
